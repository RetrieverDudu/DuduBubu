<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eine wichtige Frage 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #ff9ad5, #ffd6ec, #c8f7ff, #ffe29a);
  background-size: 400% 400%;
  animation: gradientBG 12s ease infinite;
}
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.hearts {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  top: 0;
  left: 0;
}
.heart {
  position: absolute;
  color: rgba(255, 105, 180, 0.6);
  animation: floatUp 6s linear infinite;
  font-size: 20px;
}
@keyframes floatUp {
  from { transform: translateY(100vh) scale(0.8); opacity: 1; }
  to { transform: translateY(-10vh) scale(1.4); opacity: 0; }
}
.card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding: 40px 30px;
  border-radius: 30px;
  box-shadow: 0 15px 50px rgba(0,0,0,0.25);
  text-align: center;
  max-width: 400px;
  width: 90%;
  position: relative;
  z-index: 2;
}
h1 {
  font-family: 'Pacifico', cursive;
  font-size: 30px;
  color: #ff4da6;
  margin-bottom: 12px;
}
.subtitle {
  font-size: 18px;
  margin-bottom: 15px;
}
.panda {
  font-size: 55px;
  margin: 10px 0;
}
.buttons {
  position: relative;
  margin-top: 15px;
  min-height: 100px;
}
button {
  border: none;
  padding: 16px 28px;
  font-size: 19px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  margin: 8px;
  font-weight: 700;
  position: relative;
}
#yesBtn {
  background: linear-gradient(45deg, #4CAF50, #2ecc71);
  color: white;
  transform: scale(1);
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}
#yesBtn:hover {
  transform: scale(1.1);
}
#noBtn {
  background: linear-gradient(45deg, #ff4d6d, #ff6f91);
  color: white;
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>
<div class="card">
  <div class="panda">🐼💖🐻</div>
  <h1>Möchtest du mit mir nach Teneriffa? 🌴💕</h1>
  <div class="subtitle">Sonne ☀️ Strand 🌊 Erdbeeren 🍓 & ganz viel Liebe 💕</div>
  <div class="buttons" id="buttonArea">
    <button id="yesBtn">JA 💚</button>
    <button id="noBtn">Nein ❌</button>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f1c8c8e4b.mp3?filename=sweet-love-11013.mp3" type="audio/mpeg">
</audio>

<script>
const heartsContainer = document.getElementById("hearts");
for (let i = 0; i < 30; i++) {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (4 + Math.random() * 4) + "s";
  heart.style.fontSize = (15 + Math.random() * 30) + "px";
  heartsContainer.appendChild(heart);
}

let noCount = 0;
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const buttonArea = document.getElementById("buttonArea");
const noTexts = ["Nein ❌","Ganz sicher? 😢","Wirklich??? 🥺","Letzte Chance 😭",
"Bist du sicher?? 😩","Überleg nochmal 😭","Bitteeee 🥺","Denk an uns 😭",
"Ich flehe dich an 😭","Okay… letzter Versuch 😩"];

noBtn.addEventListener("click", () => {
  noCount++;
  if (noCount < noTexts.length) noBtn.textContent = noTexts[noCount];
  let scale = 1 + noCount * 0.2;
  yesBtn.style.transform = `scale(${scale})`;
  moveButtonWithinBounds();
});

function moveButtonWithinBounds() {
  const maxX = buttonArea.clientWidth - noBtn.offsetWidth;
  const maxY = buttonArea.clientHeight - noBtn.offsetHeight;
  const randomX = Math.random() * maxX;
  const randomY = Math.random() * maxY;
  noBtn.style.position = "absolute";
  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
}

// Musik automatisch starten beim ersten Klick
let musicStarted = false;
function startMusic() {
  if (!musicStarted) {
    document.getElementById('bgMusic').play();
    musicStarted = true;
  }
}

yesBtn.addEventListener("mouseenter", () => {
  confetti({ particleCount: 50, spread: 90, origin: { y: 0.5 } });
  startMusic();
});

yesBtn.addEventListener("click", () => {
  startMusic();
  if (navigator.vibrate) navigator.vibrate(200); // Vibration bei Klick
  confetti({ particleCount: 300, spread: 160, origin: { y: 0.6 } });
  document.body.innerHTML = `
  <div style="position:relative;width:100%;height:100vh;background:radial-gradient(circle at center, #ff9ad5, #ffd6ec, #c8f7ff, #ffe29a);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Pacifico', cursive;color:white;">
    <canvas id='confettiCanvas' style='position:absolute;top:0;left:0;width:100%;height:100%;'></canvas>
    <h1 style='font-size:50px;text-shadow:0 0 25px #fff;'>YAAAAY!!! 💕🎀🌴</h1>
    <p style='font-size:30px;text-shadow:0 0 20px #ff4da6;'>Teneriffa wir kommen!!! ✈️☀️🌊</p>
    <div style='font-size:70px;margin:20px 0;'>🐻💖🍓🎀🌸💖</div>
    <p style='font-size:28px;text-shadow:0 0 20px #fff;'>Dein Braunbär liebt dich 💕</p>
  </div>
  `;
  const canvas = document.getElementById('confettiCanvas');
  const confettiInstance = confetti.create(canvas, { resize: true });
  setInterval(() => {
    confettiInstance({ particleCount: 50, spread: 150, origin: { y: Math.random() * 0.6 } });
    if (navigator.vibrate) navigator.vibrate(50); // kleine Vibration während Confetti
  }, 500);
});
</script>

</body>
</html>
